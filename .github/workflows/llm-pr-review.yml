name: PR Quality Gate (Free)

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: pr-quality-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  repo-sanity:
    name: Repository sanity checks
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fail on merge conflict markers
        run: |
          set -euo pipefail
          if git grep -nE '^(<<<<<<<|=======|>>>>>>>)' -- .; then
            echo "Merge conflict markers found. Resolve them before merging."
            exit 1
          fi
          echo "No merge conflict markers found."

      - name: Validate workflow files
        uses: reviewdog/action-actionlint@v1

  sql-sanity:
    name: SQL sanity checks
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate SQL files
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          sql_files=()
          while IFS= read -r file; do
            sql_files+=("$file")
          done < <(git ls-files "*.sql")

          if [ "${#sql_files[@]}" -eq 0 ]; then
            echo "No SQL files found; skipping SQL checks."
            exit 0
          fi

          for file in "${sql_files[@]}"; do
            echo "Checking ${file}"

            if [ ! -s "${file}" ]; then
              echo "SQL file is empty: ${file}"
              exit 1
            fi

            if grep -nE '^(<<<<<<<|=======|>>>>>>>)' "${file}"; then
              echo "Conflict markers detected in ${file}"
              exit 1
            fi

            if ! grep -q ';' "${file}"; then
              echo "SQL file has no semicolon-terminated statements: ${file}"
              exit 1
            fi
          done

          echo "SQL sanity checks passed."
